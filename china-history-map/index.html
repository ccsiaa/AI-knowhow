<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国历史地图 - 时间回溯</title>
  <link rel="stylesheet" href="lib/leaflet/leaflet.css" />
  <script src="lib/leaflet/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Noto Serif SC', 'Microsoft YaHei', serif;
      overflow: hidden;
      background: #1a1a2e;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #f5f0e8;
    }

    /* ===== 顶部朝代信息 ===== */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(30, 20, 10, 0.85), rgba(30, 20, 10, 0));
      padding: 20px 40px 40px;
      pointer-events: none;
    }

    #dynasty-title {
      font-size: 42px;
      color: #f0e6d3;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
      letter-spacing: 8px;
    }

    #dynasty-subtitle {
      font-size: 16px;
      color: #c8b896;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    #dynasty-desc {
      font-size: 14px;
      color: #a89878;
      margin-top: 8px;
      max-width: 500px;
    }

    /* ===== 底部时间轴面板 ===== */
    #timeline-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to top, rgba(30, 20, 10, 0.92), rgba(30, 20, 10, 0.7), rgba(30, 20, 10, 0));
      padding: 50px 30px 24px;
    }

    /* 朝代按钮行 */
    #dynasty-buttons {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .dynasty-btn {
      padding: 6px 14px;
      border: 1px solid rgba(200, 180, 140, 0.3);
      border-radius: 20px;
      background: rgba(200, 180, 140, 0.08);
      color: #c8b48c;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }

    .dynasty-btn:hover {
      background: rgba(200, 180, 140, 0.2);
      border-color: rgba(200, 180, 140, 0.6);
      color: #f0e6d3;
    }

    .dynasty-btn.active {
      background: rgba(200, 160, 60, 0.3);
      border-color: #c8a03c;
      color: #ffd700;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(200, 160, 60, 0.3);
    }

    /* 时间轴滑块 */
    #slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 10px;
    }

    #timeline-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(200, 180, 140, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700, #c8a03c);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
      transition: transform 0.2s;
    }

    #timeline-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    #timeline-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700, #c8a03c);
      cursor: pointer;
      border: none;
    }

    /* 控制按钮 */
    .ctrl-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(200, 180, 140, 0.4);
      background: rgba(200, 180, 140, 0.1);
      color: #c8b48c;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      background: rgba(200, 180, 140, 0.3);
      color: #ffd700;
      box-shadow: 0 0 10px rgba(200, 160, 60, 0.3);
    }

    /* 年份标签 */
    #year-label {
      color: #c8a03c;
      font-size: 13px;
      min-width: 80px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* ===== 地图样式覆盖 ===== */
    .leaflet-container {
      background: #f5f0e8 !important;
    }

    .leaflet-control-zoom {
      border: 1px solid rgba(200, 180, 140, 0.4) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(30, 20, 10, 0.8) !important;
      color: #c8b48c !important;
      border-bottom-color: rgba(200, 180, 140, 0.3) !important;
    }

    .leaflet-control-zoom a:hover {
      background: rgba(30, 20, 10, 0.95) !important;
      color: #ffd700 !important;
    }

    .leaflet-control-attribution {
      background: rgba(245, 240, 232, 0.8) !important;
      font-size: 10px !important;
    }

    /* ===== 加载遮罩 ===== */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1e140a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      color: #f0e6d3;
      font-size: 36px;
      letter-spacing: 12px;
      margin-bottom: 12px;
    }

    #loading p {
      color: #a89878;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(200, 180, 140, 0.2);
      border-top-color: #c8a03c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== 右侧控制面板 ===== */
    #side-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-box {
      background: rgba(30, 20, 10, 0.85);
      border: 1px solid rgba(200, 180, 140, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #c8b48c;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }

    .side-box label {
      display: block;
      margin-bottom: 6px;
      color: #f0e6d3;
      font-size: 12px;
    }

    #opacity-slider {
      width: 100px;
      height: 3px;
      -webkit-appearance: none;
      background: rgba(200, 180, 140, 0.3);
      border-radius: 2px;
      outline: none;
    }

    #opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c8a03c;
      cursor: pointer;
    }

    /* 离线提示 */
    #offline-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(40, 80, 40, 0.85);
      border: 1px solid rgba(100, 200, 100, 0.4);
      border-radius: 20px;
      padding: 4px 14px;
      color: #90ee90;
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div id="loading">
    <h1>历史地图</h1>
    <p>穿越时空，纵览千年疆域</p>
    <div class="loading-spinner"></div>
  </div>

  <div id="app">
    <div id="map"></div>

    <!-- 离线标识 -->
    <div id="offline-badge">● 离线模式</div>

    <!-- 顶部信息 -->
    <div id="top-bar">
      <div id="dynasty-title">秦朝</div>
      <div id="dynasty-subtitle">前221年 - 前207年</div>
      <div id="dynasty-desc">中国第一个统一的中央集权制帝国</div>
    </div>

    <!-- 右侧面板 -->
    <div id="side-panel">
      <div class="side-box">
        <div style="color: #f0e6d3; margin-bottom: 4px;">图例说明</div>
        底图来源：中研院 CCTS<br>
        基于谭其骧《中国历史地图集》
      </div>
      <div class="side-box">
        <label>历史图层透明度</label>
        <input type="range" id="opacity-slider" min="0" max="100" value="85" />
      </div>
    </div>

    <!-- 底部时间轴 -->
    <div id="timeline-panel">
      <div id="dynasty-buttons"></div>
      <div id="slider-row">
        <button class="ctrl-btn" id="btn-prev" title="上一朝代">◀</button>
        <button class="ctrl-btn" id="btn-play" title="自动播放">▶</button>
        <button class="ctrl-btn" id="btn-next" title="下一朝代">▶</button>
        <input type="range" id="timeline-slider" min="0" max="100" value="0" />
        <span id="year-label">前221年</span>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // 朝代数据
    // ============================================================
    const dynasties = [
      { id: 'bc0210', name: '秦', fullName: '秦朝', period: '前221年 - 前207年', year: -221, desc: '中国第一个统一的中央集权制帝国，书同文、车同轨、统一度量衡' },
      { id: 'bc0007', name: '西汉', fullName: '西汉', period: '前202年 - 8年', year: -202, desc: '丝绸之路开辟，疆域扩展至西域，儒学成为正统思想' },
      { id: 'ad0140', name: '东汉', fullName: '东汉', period: '25年 - 220年', year: 25, desc: '光武中兴，班超经营西域，蔡伦改进造纸术' },
      { id: 'ad0262', name: '三国', fullName: '三国', period: '220年 - 280年', year: 220, desc: '魏蜀吴三分天下，英雄辈出的乱世' },
      { id: 'ad0281', name: '西晋', fullName: '西晋', period: '265年 - 316年', year: 265, desc: '短暂统一，八王之乱后五胡乱华' },
      { id: 'ad0382', name: '东晋', fullName: '东晋', period: '317年 - 420年', year: 317, desc: '衣冠南渡，士族门阀政治，书圣王羲之' },
      { id: 'ad0497', name: '南北朝', fullName: '南北朝', period: '420年 - 589年', year: 420, desc: '民族大融合，佛教兴盛，石窟艺术繁荣' },
      { id: 'ad0612', name: '隋', fullName: '隋朝', period: '581年 - 618年', year: 581, desc: '结束南北朝分裂，开创科举制度，修建大运河' },
      { id: 'ad0741', name: '唐', fullName: '唐朝', period: '618年 - 907年', year: 618, desc: '贞观之治、开元盛世，疆域辽阔，文化繁荣的黄金时代' },
      { id: 'ad1111', name: '北宋', fullName: '北宋', period: '960年 - 1127年', year: 960, desc: '经济文化高度发达，活字印刷、火药、指南针' },
      { id: 'ad1208', name: '南宋', fullName: '南宋', period: '1127年 - 1279年', year: 1127, desc: '偏安江南，海上贸易繁荣，理学兴盛' },
      { id: 'ad1330', name: '元', fullName: '元朝', period: '1271年 - 1368年', year: 1271, desc: '蒙古帝国建立，疆域空前辽阔，设行省制度' },
      { id: 'ad1582', name: '明', fullName: '明朝', period: '1368年 - 1644年', year: 1368, desc: '驱逐蒙元，郑和下西洋，修建长城，资本主义萌芽' },
      { id: 'ad1820', name: '清', fullName: '清朝', period: '1636年 - 1912年', year: 1636, desc: '康乾盛世，疆域达到历史最大，晚清衰落' }
    ]

    // ============================================================
    // 全局状态
    // ============================================================
    let map = null
    let currentHistoryLayer = null
    let currentIndex = 0
    let isPlaying = false
    let playTimer = null

    // ============================================================
    // 初始化地图
    // ============================================================
    function initMap() {
      map = L.map('map', {
        center: [32, 108],
        zoom: 4,
        minZoom: 3,
        maxZoom: 5,
        zoomControl: true
      })

      // 加载第一个朝代
      loadDynastyLayer(0)
    }

    // ============================================================
    // 加载朝代瓦片图层（本地离线）
    // ============================================================
    function loadDynastyLayer(index) {
      const dynasty = dynasties[index]

      // 淡出旧图层
      if (currentHistoryLayer) {
        const oldLayer = currentHistoryLayer
        fadeLayer(oldLayer, 'out', () => {
          map.removeLayer(oldLayer)
        })
      }

      // 从本地 tiles 目录加载瓦片
      const newLayer = L.tileLayer(
        `tiles/${dynasty.id}/{z}/{x}_{y}.png`,
        {
          maxZoom: 5,
          minZoom: 3,
          opacity: 0,
          tms: false,
          errorTileUrl: '',
          attribution: '中研院 CCTS | 谭其骧《中国历史地图集》'
        }
      )

      newLayer.addTo(map)
      currentHistoryLayer = newLayer

      // 淡入新图层
      const targetOpacity = parseInt(document.getElementById('opacity-slider').value) / 100
      fadeLayer(newLayer, 'in', null, targetOpacity)

      // 更新 UI
      currentIndex = index
      updateUI(dynasty)
    }

    // ============================================================
    // 图层淡入淡出动画
    // ============================================================
    function fadeLayer(layer, direction, callback, targetOpacity = 0.85) {
      let opacity = direction === 'in' ? 0 : targetOpacity
      const step = direction === 'in' ? 0.05 : -0.05
      const end = direction === 'in' ? targetOpacity : 0

      const interval = setInterval(() => {
        opacity += step
        if ((direction === 'in' && opacity >= end) || (direction === 'out' && opacity <= end)) {
          opacity = end
          clearInterval(interval)
          layer.setOpacity(opacity)
          if (callback) callback()
        } else {
          layer.setOpacity(opacity)
        }
      }, 30)
    }

    // ============================================================
    // 更新 UI
    // ============================================================
    function updateUI(dynasty) {
      document.getElementById('dynasty-title').textContent = dynasty.fullName
      document.getElementById('dynasty-subtitle').textContent = dynasty.period
      document.getElementById('dynasty-desc').textContent = dynasty.desc

      const yearText = dynasty.year < 0 ? `前${Math.abs(dynasty.year)}年` : `${dynasty.year}年`
      document.getElementById('year-label').textContent = yearText

      document.getElementById('timeline-slider').value = (currentIndex / (dynasties.length - 1)) * 100

      document.querySelectorAll('.dynasty-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === currentIndex)
      })
    }

    // ============================================================
    // 初始化时间轴
    // ============================================================
    function initTimeline() {
      const container = document.getElementById('dynasty-buttons')

      dynasties.forEach((d, i) => {
        const btn = document.createElement('button')
        btn.className = 'dynasty-btn' + (i === 0 ? ' active' : '')
        btn.textContent = d.name
        btn.addEventListener('click', () => goTo(i))
        container.appendChild(btn)
      })

      document.getElementById('timeline-slider').addEventListener('input', (e) => {
        const idx = Math.round((parseInt(e.target.value) / 100) * (dynasties.length - 1))
        if (idx !== currentIndex) goTo(idx)
      })

      document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentIndex > 0) goTo(currentIndex - 1)
      })
      document.getElementById('btn-next').addEventListener('click', () => {
        if (currentIndex < dynasties.length - 1) goTo(currentIndex + 1)
      })
      document.getElementById('btn-play').addEventListener('click', togglePlay)

      document.getElementById('opacity-slider').addEventListener('input', (e) => {
        const opacity = parseInt(e.target.value) / 100
        if (currentHistoryLayer) currentHistoryLayer.setOpacity(opacity)
      })

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && currentIndex > 0) goTo(currentIndex - 1)
        if (e.key === 'ArrowRight' && currentIndex < dynasties.length - 1) goTo(currentIndex + 1)
        if (e.key === ' ') { e.preventDefault(); togglePlay() }
      })
    }

    // ============================================================
    // 切换朝代
    // ============================================================
    function goTo(index) {
      if (index < 0 || index >= dynasties.length || index === currentIndex) return
      loadDynastyLayer(index)
    }

    // ============================================================
    // 自动播放
    // ============================================================
    function togglePlay() {
      const btn = document.getElementById('btn-play')
      if (isPlaying) {
        clearInterval(playTimer)
        isPlaying = false
        btn.textContent = '▶'
      } else {
        isPlaying = true
        btn.textContent = '⏸'
        playTimer = setInterval(() => {
          const next = currentIndex < dynasties.length - 1 ? currentIndex + 1 : 0
          goTo(next)
        }, 3000)
      }
    }

    // ============================================================
    // 启动
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      initMap()
      initTimeline()
      setTimeout(() => {
        document.getElementById('loading').classList.add('fade-out')
      }, 800)
    })
  </script>
</body>
</html>
